<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LegoLog</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  .stud { box-shadow: inset 0 2px 0 rgba(255,255,255,.25), inset 0 -2px 0 rgba(0,0,0,.25); }
</style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

<header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center gap-4">
    <div class="flex items-center gap-2.5">
      <div class="grid grid-cols-2 gap-0.5">
        <span class="stud w-3 h-3 rounded-full bg-red-500"></span>
        <span class="stud w-3 h-3 rounded-full bg-yellow-400"></span>
        <span class="stud w-3 h-3 rounded-full bg-blue-500"></span>
        <span class="stud w-3 h-3 rounded-full bg-green-500"></span>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Lego<span class="text-yellow-400">Log</span></h1>
    </div>
    <nav class="flex gap-1 text-sm">
      <button data-tab="collection" class="tab-btn px-3 py-1.5 rounded-lg font-medium">My Collection</button>
      <button data-tab="buildable" class="tab-btn px-3 py-1.5 rounded-lg font-medium">What Can I Build?</button>
    </nav>
    <div id="stats" class="ml-auto flex gap-4 text-xs text-slate-400"></div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6">

  <!-- ============ COLLECTION TAB ============ -->
  <section id="tab-collection">
    <div class="relative max-w-2xl">
      <input id="search" type="text" placeholder="Search sets by number or name — e.g. 75192 or Millennium Falcon"
        class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-yellow-400/60 placeholder:text-slate-500">
      <div id="search-results" class="hidden absolute z-30 mt-2 w-full bg-slate-900 border border-slate-700 rounded-xl shadow-2xl max-h-96 overflow-y-auto"></div>
    </div>

    <div id="collection-empty" class="hidden mt-10 text-center text-slate-500">
      <p class="text-lg">No sets yet.</p>
      <p class="text-sm mt-1">Search above to add the sets you own — quantities supported.</p>
    </div>

    <div id="collection-list" class="mt-6 grid gap-3"></div>
  </section>

  <!-- ============ BUILDABLE TAB ============ -->
  <section id="tab-buildable" class="hidden">
    <div class="flex flex-wrap items-end gap-x-5 gap-y-3 bg-slate-900 border border-slate-800 rounded-xl p-4">
      <label class="text-xs text-slate-400">
        Coverage ≥ <span id="cov-label" class="text-yellow-400 font-semibold">100%</span>
        <input id="f-coverage" type="range" min="50" max="100" value="100" step="5" class="block w-36 mt-1.5 accent-yellow-400">
      </label>
      <label class="text-xs text-slate-400">Min parts
        <input id="f-minparts" type="number" value="20" min="1"
          class="block w-20 mt-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1.5 text-sm text-slate-200">
      </label>
      <label class="text-xs text-slate-400">Theme
        <select id="f-theme" class="block w-44 mt-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1.5 text-sm text-slate-200">
          <option value="">All themes</option>
        </select>
      </label>
      <label class="text-xs text-slate-400">Sort
        <select id="f-sort" class="block w-32 mt-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1.5 text-sm text-slate-200">
          <option value="coverage">Coverage</option>
          <option value="parts">Part count</option>
          <option value="year">Newest</option>
        </select>
      </label>
      <label class="flex items-center gap-2 text-xs text-slate-400 pb-1.5 cursor-pointer">
        <input id="f-ignorecolor" type="checkbox" class="accent-yellow-400"> Ignore color
      </label>
      <label class="flex items-center gap-2 text-xs text-slate-400 pb-1.5 cursor-pointer">
        <input id="f-owned" type="checkbox" class="accent-yellow-400"> Include sets I own
      </label>
      <span id="buildable-count" class="ml-auto text-xs text-slate-500 pb-1.5"></span>
    </div>

    <div id="buildable-empty" class="hidden mt-10 text-center text-slate-500"></div>
    <div id="buildable-grid" class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
    <div class="mt-6 text-center">
      <button id="load-more" class="hidden px-4 py-2 text-sm bg-slate-800 hover:bg-slate-700 rounded-lg">Load more</button>
    </div>
  </section>
</main>

<!-- ============ MISSING PARTS MODAL ============ -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl max-w-2xl w-full max-h-[85vh] flex flex-col">
    <div id="modal-head" class="p-5 border-b border-slate-800"></div>
    <div id="modal-body" class="p-5 overflow-y-auto"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = n => (n ?? 0).toLocaleString();
const api = async (path, opts) => {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.statusText);
  return r.json();
};

// ---------------- tabs ----------------
let activeTab = 'collection';
function showTab(name) {
  activeTab = name;
  $('#tab-collection').classList.toggle('hidden', name !== 'collection');
  $('#tab-buildable').classList.toggle('hidden', name !== 'buildable');
  document.querySelectorAll('.tab-btn').forEach(b => {
    const on = b.dataset.tab === name;
    b.className = 'tab-btn px-3 py-1.5 rounded-lg font-medium ' +
      (on ? 'bg-yellow-400 text-slate-950' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800');
  });
  if (name === 'buildable') loadBuildable(true);
}
document.querySelectorAll('.tab-btn').forEach(b => b.onclick = () => showTab(b.dataset.tab));

// ---------------- search ----------------
let searchTimer;
$('#search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { $('#search-results').classList.add('hidden'); return; }
  searchTimer = setTimeout(() => doSearch(q), 250);
});
document.addEventListener('click', e => {
  if (!e.target.closest('#search') && !e.target.closest('#search-results'))
    $('#search-results').classList.add('hidden');
});

async function doSearch(q) {
  const results = await api('/api/search?q=' + encodeURIComponent(q));
  const box = $('#search-results');
  box.innerHTML = results.length ? results.map(s => `
    <div class="flex items-center gap-3 p-2.5 hover:bg-slate-800 border-b border-slate-800/60 last:border-0">
      <img src="${esc(s.img_url)}" loading="lazy" onerror="this.style.visibility='hidden'"
           class="w-14 h-14 object-contain bg-white rounded-lg shrink-0">
      <div class="min-w-0 flex-1">
        <div class="text-sm font-medium truncate">${esc(s.name)}</div>
        <div class="text-xs text-slate-400">${esc(s.set_num)} · ${s.year ?? '?'} · ${esc(s.theme ?? '')} · ${num(s.num_parts)} parts</div>
      </div>
      ${s.owned ? `<span class="text-xs text-green-400 shrink-0">✓ own ${s.owned}</span>` : ''}
      <button onclick="addSet('${esc(s.set_num)}')"
        class="shrink-0 px-3 py-1.5 text-xs font-semibold bg-yellow-400 text-slate-950 rounded-lg hover:bg-yellow-300">+ Add</button>
    </div>`).join('')
    : '<div class="p-4 text-sm text-slate-500">No sets found.</div>';
  box.classList.remove('hidden');
}

async function addSet(setNum) {
  await api('/api/collection', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({set_num: setNum, quantity: 1})});
  $('#search-results').classList.add('hidden');
  $('#search').value = '';
  loadCollection();
}

// ---------------- collection ----------------
async function loadCollection() {
  const data = await api('/api/collection');
  const {sets, stats} = data;
  $('#stats').innerHTML = `
    <span><b class="text-slate-200">${num(stats.set_count)}</b> sets</span>
    <span><b class="text-slate-200">${num(stats.total_parts)}</b> parts</span>
    <span><b class="text-slate-200">${num(stats.distinct_parts)}</b> unique lots</span>`;
  $('#collection-empty').classList.toggle('hidden', sets.length > 0);
  $('#collection-list').innerHTML = sets.map(s => `
    <div class="flex items-center gap-4 bg-slate-900 border border-slate-800 rounded-xl p-3">
      <img src="${esc(s.img_url)}" loading="lazy" onerror="this.style.visibility='hidden'"
           class="w-20 h-20 object-contain bg-white rounded-lg shrink-0">
      <div class="min-w-0 flex-1">
        <div class="font-medium truncate">${esc(s.name)}</div>
        <div class="text-xs text-slate-400 mt-0.5">${esc(s.set_num)} · ${s.year ?? '?'} · ${esc(s.theme ?? '')} · ${num(s.num_parts)} parts</div>
      </div>
      <div class="flex items-center gap-1.5 shrink-0">
        <button onclick="changeQty('${esc(s.set_num)}', ${s.quantity - 1})"
          class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 text-lg leading-none">−</button>
        <span class="w-10 text-center font-semibold">${s.quantity}</span>
        <button onclick="changeQty('${esc(s.set_num)}', ${s.quantity + 1})"
          class="w-8 h-8 rounded-lg bg-slate-800 hover:bg-slate-700 text-lg leading-none">+</button>
      </div>
      <button onclick="removeSet('${esc(s.set_num)}')" title="Remove"
        class="shrink-0 w-8 h-8 rounded-lg text-slate-500 hover:text-red-400 hover:bg-slate-800">✕</button>
    </div>`).join('');
}

async function changeQty(setNum, qty) {
  if (qty < 1) return removeSet(setNum);
  await api('/api/collection/' + encodeURIComponent(setNum),
    {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({set_num: setNum, quantity: qty})});
  loadCollection();
}
async function removeSet(setNum) {
  await api('/api/collection/' + encodeURIComponent(setNum), {method:'DELETE'});
  loadCollection();
}

// ---------------- buildable ----------------
let buildOffset = 0;
const PAGE = 60;
let buildBusy = false;

for (const id of ['f-minparts','f-theme','f-sort','f-ignorecolor','f-owned'])
  $('#'+id).addEventListener('change', () => loadBuildable(true));
$('#f-coverage').addEventListener('input', () => $('#cov-label').textContent = $('#f-coverage').value + '%');
$('#f-coverage').addEventListener('change', () => loadBuildable(true));
$('#load-more').onclick = () => loadBuildable(false);

async function loadBuildable(reset) {
  if (buildBusy) return;
  buildBusy = true;
  if (reset) { buildOffset = 0; $('#buildable-grid').innerHTML = ''; }
  $('#buildable-count').textContent = 'computing…';
  try {
    const p = new URLSearchParams({
      min_coverage: (+$('#f-coverage').value / 100).toString(),
      min_parts: $('#f-minparts').value || '1',
      ignore_color: $('#f-ignorecolor').checked,
      include_owned: $('#f-owned').checked,
      sort: $('#f-sort').value,
      limit: PAGE, offset: buildOffset,
    });
    if ($('#f-theme').value) p.set('theme_id', $('#f-theme').value);
    const data = await api('/api/buildable?' + p);
    buildOffset += data.results.length;
    $('#buildable-count').textContent = num(data.total) + ' sets match';
    $('#load-more').classList.toggle('hidden', buildOffset >= data.total);
    const cov100 = +$('#f-coverage').value === 100;
    $('#buildable-empty').classList.toggle('hidden', data.total > 0);
    if (!data.total) $('#buildable-empty').innerHTML = cov100
      ? '<p class="text-lg">Nothing fully buildable yet.</p><p class="text-sm mt-1">Lower the coverage slider to see near-misses, or add more sets.</p>'
      : '<p class="text-lg">No matches.</p><p class="text-sm mt-1">Try loosening the filters.</p>';
    $('#buildable-grid').insertAdjacentHTML('beforeend', data.results.map(s => {
      const pct = Math.floor(s.coverage * 1000) / 10;
      const missing = s.total_parts - s.have_parts;
      const full = s.coverage >= 1;
      return `
      <div onclick="openMissing('${esc(s.set_num)}', '${esc(s.name).replace(/'/g, "\\'")}')"
           class="cursor-pointer bg-slate-900 border ${full ? 'border-green-500/40' : 'border-slate-800'} rounded-xl overflow-hidden hover:border-yellow-400/50 transition-colors">
        <div class="bg-white h-40 flex items-center justify-center p-2">
          <img src="${esc(s.img_url)}" loading="lazy" onerror="this.style.visibility='hidden'" class="max-h-full max-w-full object-contain">
        </div>
        <div class="p-3">
          <div class="text-sm font-medium truncate" title="${esc(s.name)}">${esc(s.name)}</div>
          <div class="text-xs text-slate-400 mt-0.5">${esc(s.set_num)} · ${s.year ?? '?'} · ${esc(s.theme ?? '')}</div>
          <div class="mt-2.5 h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full ${full ? 'bg-green-500' : 'bg-yellow-400'}" style="width:${pct}%"></div>
          </div>
          <div class="mt-1.5 flex justify-between text-xs">
            <span class="${full ? 'text-green-400 font-semibold' : 'text-slate-400'}">${full ? '✓ Buildable' : pct + '%'}</span>
            <span class="text-slate-500">${full ? num(s.total_parts) + ' parts' : 'missing ' + num(missing) + ' of ' + num(s.total_parts)}</span>
          </div>
        </div>
      </div>`;
    }).join(''));
  } finally { buildBusy = false; }
}

// ---------------- missing parts modal ----------------
async function openMissing(setNum, name) {
  $('#modal').classList.remove('hidden');
  $('#modal-head').innerHTML = `<div class="font-semibold">${esc(name)}</div>
    <div class="text-xs text-slate-400 mt-0.5">${esc(setNum)}</div>`;
  $('#modal-body').innerHTML = '<div class="text-sm text-slate-500">Loading…</div>';
  const ic = $('#f-ignorecolor').checked;
  const d = await api(`/api/sets/${encodeURIComponent(setNum)}/missing?ignore_color=${ic}`);
  if (!d.missing.length) {
    $('#modal-body').innerHTML = `<div class="text-green-400 font-medium">✓ You have every part — ${d.total_lots} part lots covered.</div>`;
    return;
  }
  const shortTotal = d.missing.reduce((a,p) => a + (p.need - p.have), 0);
  $('#modal-body').innerHTML = `
    <div id="fill-options" class="mb-5"><div class="text-sm text-slate-500">Finding sets that would fill the gap…</div></div>` + `
    <div class="text-sm text-slate-300 mb-3">${d.covered_lots} of ${d.total_lots} lots covered —
      <b class="text-yellow-400">${num(shortTotal)} parts missing</b> across ${d.missing.length} lots:</div>
    <table class="w-full text-sm">
      <thead><tr class="text-xs text-slate-500 text-left">
        <th class="py-1.5 font-medium">Part</th><th class="font-medium">Color</th>
        <th class="text-right font-medium">Have</th><th class="text-right font-medium">Need</th>
        <th class="text-right font-medium text-red-400">Short</th></tr></thead>
      <tbody>${d.missing.map(p => `
        <tr class="border-t border-slate-800">
          <td class="py-1.5 pr-3"><span class="text-slate-400">${esc(p.part_num)}</span> ${esc(p.part_name ?? '')}</td>
          <td class="pr-3 whitespace-nowrap">${p.rgb ? `<span class="inline-block w-3 h-3 rounded-sm mr-1 align-middle border border-slate-600" style="background:#${esc(p.rgb)}"></span>` : ''}${esc(p.color ?? 'any')}</td>
          <td class="text-right">${num(p.have)}</td>
          <td class="text-right">${num(p.need)}</td>
          <td class="text-right text-red-400 font-medium">${num(p.need - p.have)}</td>
        </tr>`).join('')}
      </tbody></table>`;
  loadFillOptions(setNum, ic);
}

function donorCard(s, note) {
  return `
    <a href="https://rebrickable.com/sets/${encodeURIComponent(s.set_num)}/" target="_blank" rel="noopener"
       class="flex items-center gap-3 bg-slate-800/60 hover:bg-slate-800 border border-slate-700/60 rounded-lg p-2 min-w-0 flex-1">
      <img src="${esc(s.img_url)}" loading="lazy" onerror="this.style.visibility='hidden'"
           class="w-12 h-12 object-contain bg-white rounded shrink-0">
      <div class="min-w-0">
        <div class="text-sm font-medium truncate">${esc(s.name)}</div>
        <div class="text-xs text-slate-400">${esc(s.set_num)} · ${s.year ?? '?'} · ${num(s.num_parts)} parts${note ? ' · ' + note : ''}</div>
      </div>
    </a>`;
}

async function loadFillOptions(setNum, ic) {
  const d = await api(`/api/sets/${encodeURIComponent(setNum)}/fill?ignore_color=${ic}`);
  const box = $('#fill-options');
  if (!box) return;
  let html = '';
  if (d.singles.length) {
    html += `<div class="text-sm font-semibold text-yellow-400 mb-2">💡 One set would cover everything missing:</div>
      <div class="grid gap-2">${d.singles.map(s => donorCard(s, 'covers all ' + num(d.gap_parts) + ' missing')).join('')}</div>`;
  }
  if (d.pairs.length) {
    html += `<div class="text-sm font-semibold text-yellow-400 mt-3 mb-2">${d.singles.length ? 'Or pair up:' : '💡 These pairs together cover everything missing:'}</div>
      <div class="grid gap-2">${d.pairs.map(pr => `
        <div class="flex items-stretch gap-2">
          ${donorCard(pr[0], Math.round(pr[0].covers_pct * 100) + '% of gap')}
          <span class="self-center text-slate-500 font-bold shrink-0">+</span>
          ${donorCard(pr[1], Math.round(pr[1].covers_pct * 100) + '% of gap')}
        </div>`).join('')}</div>`;
  }
  if (!d.singles.length && !d.pairs.length) {
    if (d.near_pairs?.length) {
      html += `<div class="text-sm font-semibold text-slate-300 mb-2">No combo covers 100% of the gap — closest pairings:</div>
        <div class="grid gap-2">${d.near_pairs.map(pr => `
          <div>
            <div class="flex items-stretch gap-2">
              ${donorCard(pr[0], Math.round(pr[0].covers_pct * 100) + '%')}
              <span class="self-center text-slate-500 font-bold shrink-0">+</span>
              ${donorCard(pr[1], Math.round(pr[1].covers_pct * 100) + '%')}
            </div>
            <div class="text-xs text-slate-500 mt-1 text-right">together: ${Math.round(pr[2].combined_pct * 100)}% of the gap (${num(d.gap_parts - pr[2].combined)} parts still short)</div>
          </div>`).join('')}</div>`;
    } else if (d.partial.length) {
      html += `<div class="text-sm font-semibold text-slate-300 mb-2">No single set or pair covers the whole gap — closest contributors:</div>
        <div class="grid gap-2">${d.partial.map(s => donorCard(s, 'covers ' + Math.round(s.covers_pct * 100) + '% of gap')).join('')}</div>`;
    }
  }
  box.innerHTML = html;
}
function closeModal() { $('#modal').classList.add('hidden'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ---------------- init ----------------
(async function init() {
  showTab('collection');
  loadCollection();
  const themes = await api('/api/themes');
  $('#f-theme').insertAdjacentHTML('beforeend',
    themes.map(t => `<option value="${t.id}">${esc(t.name)} (${t.n})</option>`).join(''));
})();
</script>
</body>
</html>
