<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Track the LEGO sets you own and find out which other sets you can build from your combined parts.">
<meta name="theme-color" content="#020617">
<title>LegoLog</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='8' fill='%230f172a'/%3E%3Ccircle cx='14' cy='14' r='5' fill='%23ef4444'/%3E%3Ccircle cx='26' cy='14' r='5' fill='%23facc15'/%3E%3Ccircle cx='14' cy='26' r='5' fill='%2360a5fa'/%3E%3Ccircle cx='26' cy='26' r='5' fill='%2322c55e'/%3E%3C/svg%3E">
<link rel="stylesheet" href="design-system.css">
<script type="importmap">
{"imports": {"three": "./vendor/three/three.module.min.js"}}
</script>
</head>
<body>

<header class="app-header">
  <div class="container header-inner flex flex-wrap items-center gap-4">
    <div class="brand">
      <div class="stud-mark" aria-hidden="true">
        <span class="stud stud-red"></span>
        <span class="stud stud-yellow"></span>
        <span class="stud stud-blue"></span>
        <span class="stud stud-green"></span>
      </div>
      <h1 class="brand-name">Lego<span class="brand-accent">Log</span></h1>
    </div>
    <nav class="tabs" role="tablist" aria-label="Sections">
      <button id="tab-btn-collection" class="tab" role="tab" aria-selected="true" aria-controls="tab-collection" data-tab="collection">My Collection</button>
      <button id="tab-btn-buildable" class="tab" role="tab" aria-selected="false" aria-controls="tab-buildable" data-tab="buildable" tabindex="-1">What Can I Build?</button>
      <button id="tab-btn-map" class="tab" role="tab" aria-selected="false" aria-controls="tab-map" data-tab="map" tabindex="-1">3D Map</button>
    </nav>
    <div id="stats" class="stats flex gap-4 ml-auto"></div>
  </div>
</header>

<main class="container" style="padding-block:1.5rem;">

  <!-- ============ COLLECTION TAB ============ -->
  <section id="tab-collection" role="tabpanel" aria-labelledby="tab-btn-collection" tabindex="0">
    <div class="relative" style="max-width:42rem;">
      <label for="search" class="visually-hidden">Search sets by number or name</label>
      <input id="search" type="text" autocomplete="off" placeholder="Search sets by number or name — e.g. 75192 or Millennium Falcon (press / to focus)"
        class="input search-input">
      <div id="search-results" class="search-panel hidden"></div>
    </div>

    <div id="collection-empty" class="empty-state hidden">
      <p class="headline">No sets yet.</p>
      <p>Search above to add the sets you own — quantities supported.</p>
    </div>

    <div id="collection-list" class="collection-list" style="margin-top:1.5rem;"></div>
  </section>

  <!-- ============ BUILDABLE TAB ============ -->
  <section id="tab-buildable" role="tabpanel" aria-labelledby="tab-btn-buildable" tabindex="0" class="hidden">
    <div class="card filter-bar flex flex-wrap items-end gap-x-5 gap-y-3">
      <label class="field">
        <span class="field-label">Coverage ≥ <span id="cov-label" class="value">100%</span></span>
        <input id="f-coverage" type="range" min="50" max="100" value="100" step="5" class="range" style="display:block; width:9rem; margin-top:.375rem;">
      </label>
      <label class="field">
        <span class="field-label">Min parts</span>
        <input id="f-minparts" type="number" value="20" min="1" class="input" style="display:block; width:5rem; margin-top:.25rem;">
      </label>
      <label class="field">
        <span class="field-label">Theme</span>
        <select id="f-theme" class="select" style="display:block; width:11rem; margin-top:.25rem;">
          <option value="">All themes</option>
        </select>
      </label>
      <label class="field">
        <span class="field-label">Sort</span>
        <select id="f-sort" class="select" style="display:block; width:8rem; margin-top:.25rem;">
          <option value="coverage">Coverage</option>
          <option value="parts">Part count</option>
          <option value="year">Newest</option>
        </select>
      </label>
      <label class="checkbox-field">
        <input id="f-ignorecolor" type="checkbox" class="checkbox"> Ignore color
      </label>
      <label class="checkbox-field">
        <input id="f-owned" type="checkbox" class="checkbox"> Include sets I own
      </label>
      <button id="f-reset" type="button" class="btn btn-ghost btn-sm">Reset filters</button>
      <span id="buildable-count" class="filter-bar-meta text-xs text-muted ml-auto"></span>
    </div>

    <div id="buildable-empty" class="empty-state hidden"></div>
    <div id="buildable-grid" class="buildable-grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4" style="margin-top:1.5rem;"></div>
    <div class="flex" style="justify-content:center; margin-top:1.5rem;">
      <button id="load-more" class="btn btn-secondary hidden">Load more</button>
    </div>
  </section>

  <!-- ============ 3D MAP TAB ============ -->
  <section id="tab-map" role="tabpanel" aria-labelledby="tab-btn-map" tabindex="0" class="hidden">
    <div id="map-empty" class="empty-state hidden">
      <p class="headline">No sets yet.</p>
      <p>Add sets to your collection first, then come back to explore them here.</p>
    </div>
    <div id="map-wrap" class="hidden">
      <div id="map-container" style="position:relative; width:100%; height:34rem; border-radius:var(--radius-lg); overflow:hidden; background:var(--color-bg); border:1px solid var(--color-border);"></div>
      <div id="map-hint" class="map-hint" style="position:static; transform:none; display:inline-block; margin-top:.75rem;">Click the scene to look around · WASD to move · Space / Shift for up / down · Esc to release the cursor</div>
      <div id="map-loading" class="text-xs text-muted" style="margin-top:.5rem;"></div>
    </div>
  </section>
</main>

<!-- ============ MISSING PARTS MODAL ============ -->
<div id="modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModalDialog()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <button class="icon-btn modal-close" aria-label="Close" onclick="closeModalDialog()">✕</button>
    <div id="modal-head" class="modal-header"></div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- ============ 3D VIEWER MODAL ============ -->
<div id="modal-3d" class="modal-backdrop hidden" onclick="if(event.target===this)closeModalDialog()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-3d-title" style="max-width:48rem;">
    <button class="icon-btn modal-close" aria-label="Close" onclick="closeModalDialog()">✕</button>
    <div id="modal-3d-head" class="modal-header"></div>
    <div class="modal-body" style="padding:0;">
      <div id="viewer-3d-container" style="width:100%; height:28rem;"></div>
    </div>
  </div>
</div>

<div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>

<script>
const $ = (s, root = document) => root.querySelector(s);
const esc = s => (s ?? '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = n => (n ?? 0).toLocaleString();
const FALLBACK_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='6' fill='%23f1f5f9'/%3E%3Ccircle cx='14' cy='14' r='4' fill='%23cbd5e1'/%3E%3Ccircle cx='26' cy='14' r='4' fill='%23cbd5e1'/%3E%3Ccircle cx='14' cy='26' r='4' fill='%23cbd5e1'/%3E%3Ccircle cx='26' cy='26' r='4' fill='%23cbd5e1'/%3E%3C/svg%3E";
function imgFallback(el) { el.onerror = null; el.src = FALLBACK_IMG; el.classList.add('thumb-fallback'); }

// ---------------- toasts ----------------
function showToast(message, opts = {}) {
  const { actionLabel, onAction, variant } = opts;
  const el = document.createElement('div');
  el.className = 'toast' + (variant === 'danger' ? ' toast-danger' : '');
  el.innerHTML = `<span class="toast-message">${esc(message)}</span>` +
    (actionLabel ? `<button class="toast-action">${esc(actionLabel)}</button>` : '') +
    `<button class="icon-btn icon-btn-ghost" aria-label="Dismiss" style="width:1.5rem;height:1.5rem;">✕</button>`;
  $('#toast-region').appendChild(el);
  const remove = () => el.remove();
  const timer = setTimeout(remove, 6000);
  if (actionLabel) el.querySelector('.toast-action').onclick = () => { clearTimeout(timer); onAction?.(); remove(); };
  el.querySelector('.icon-btn-ghost').onclick = () => { clearTimeout(timer); remove(); };
}

// ---------------- api ----------------
const api = async (path, opts) => {
  let r;
  try {
    r = await fetch(path, opts);
  } catch (e) {
    showToast('Network error — check your connection and try again.', {variant: 'danger'});
    throw e;
  }
  if (!r.ok) {
    const detail = (await r.json().catch(() => ({}))).detail || r.statusText || 'Something went wrong.';
    showToast(detail, {variant: 'danger'});
    throw new Error(detail);
  }
  return r.json();
};

// ---------------- tabs ----------------
let activeTab = 'collection';
function showTab(name) {
  const leavingMap = activeTab === 'map' && name !== 'map';
  activeTab = name;
  $('#tab-collection').classList.toggle('hidden', name !== 'collection');
  $('#tab-buildable').classList.toggle('hidden', name !== 'buildable');
  $('#tab-map').classList.toggle('hidden', name !== 'map');
  document.querySelectorAll('.tab').forEach(b => {
    const on = b.dataset.tab === name;
    b.setAttribute('aria-selected', on ? 'true' : 'false');
    b.tabIndex = on ? 0 : -1;
  });
  if (leavingMap) lego3dMapModule?.disposeMap(); // stop the render loop / release listeners while off-screen
  if (name === 'buildable') loadBuildable(true);
  if (name === 'map') loadMap();
}
document.querySelectorAll('.tab').forEach(b => b.onclick = () => showTab(b.dataset.tab));
$('.tabs').addEventListener('keydown', e => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const i = tabs.indexOf(document.activeElement);
  if (i === -1) return;
  e.preventDefault();
  const next = tabs[(i + (e.key === 'ArrowRight' ? 1 : -1) + tabs.length) % tabs.length];
  next.focus();
  showTab(next.dataset.tab);
});

// ---------------- search ----------------
let searchTimer;
$('#search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { $('#search-results').classList.add('hidden'); return; }
  searchTimer = setTimeout(() => doSearch(q), 250);
});
document.addEventListener('click', e => {
  if (!e.target.closest('#search') && !e.target.closest('#search-results'))
    $('#search-results').classList.add('hidden');
});
document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    $('#search').focus();
  }
});

async function doSearch(q) {
  const results = await api('/api/search?q=' + encodeURIComponent(q));
  const box = $('#search-results');
  box.innerHTML = results.length ? results.map(s => `
    <div class="search-result">
      <img src="${esc(s.img_url)}" loading="lazy" onerror="imgFallback(this)"
           class="thumb" style="width:3.5rem;height:3.5rem;">
      <div class="min-w-0 flex-1">
        <div class="text-sm font-medium truncate">${esc(s.name)}</div>
        <div class="text-xs text-muted">${esc(s.set_num)} · ${s.year ?? '?'} · ${esc(s.theme ?? '')} · ${num(s.num_parts)} parts</div>
      </div>
      ${s.owned ? `<span class="owned-tag">✓ own ${s.owned}</span>` : ''}
      <button onclick="addSet('${esc(s.set_num)}')"
        class="btn btn-primary btn-sm shrink-0">+ Add</button>
    </div>`).join('')
    : '<div class="text-sm text-muted" style="padding:1rem;">No sets found.</div>';
  box.classList.remove('hidden');
}

async function addSet(setNum) {
  await api('/api/collection', {method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({set_num: setNum, quantity: 1})});
  $('#search-results').classList.add('hidden');
  $('#search').value = '';
  loadCollection();
}

// ---------------- collection ----------------
async function loadCollection() {
  const data = await api('/api/collection');
  const {sets, stats} = data;
  $('#stats').innerHTML = `
    <span><b class="num">${num(stats.set_count)}</b> sets</span>
    <span><b class="num">${num(stats.total_parts)}</b> parts</span>
    <span><b class="num">${num(stats.distinct_parts)}</b> unique lots</span>`;
  $('#collection-empty').classList.toggle('hidden', sets.length > 0);
  $('#collection-list').innerHTML = sets.map(s => `
    <div class="card collection-card" data-set="${esc(s.set_num)}">
      <img src="${esc(s.img_url)}" loading="lazy" onerror="imgFallback(this)"
           class="thumb" style="width:5rem;height:5rem;">
      <div class="min-w-0 flex-1">
        <div class="font-medium truncate">${esc(s.name)}</div>
        <div class="text-xs text-muted" style="margin-top:.125rem;">${esc(s.set_num)} · ${s.year ?? '?'} · ${esc(s.theme ?? '')} · ${num(s.num_parts)} parts</div>
      </div>
      <div class="qty-control shrink-0">
        <button aria-label="Decrease quantity of ${esc(s.name)}" onclick="changeQty('${esc(s.set_num)}', ${s.quantity - 1}, '${esc(s.name).replace(/'/g, "\\'")}')"
          class="icon-btn">−</button>
        <span class="qty-value num">${s.quantity}</span>
        <button aria-label="Increase quantity of ${esc(s.name)}" onclick="changeQty('${esc(s.set_num)}', ${s.quantity + 1}, '${esc(s.name).replace(/'/g, "\\'")}')"
          class="icon-btn">+</button>
      </div>
      <button aria-label="View ${esc(s.name)} in 3D" title="View in 3D"
        onclick="open3DModel('${esc(s.set_num)}', '${esc(s.name).replace(/'/g, "\\'")}')"
        class="btn btn-ghost btn-sm shrink-0">3D</button>
      <button aria-label="Remove ${esc(s.name)}" title="Remove"
        onclick="removeSet('${esc(s.set_num)}', '${esc(s.name).replace(/'/g, "\\'")}', ${s.quantity})"
        class="icon-btn icon-btn-ghost shrink-0">✕</button>
    </div>`).join('');
}

async function changeQty(setNum, qty, name) {
  if (qty < 1) return removeSet(setNum, name, 1);
  await api('/api/collection/' + encodeURIComponent(setNum),
    {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({set_num: setNum, quantity: qty})});
  loadCollection();
}

async function removeSet(setNum, name, quantity) {
  await api('/api/collection/' + encodeURIComponent(setNum), {method: 'DELETE'});
  loadCollection();
  showToast(`Removed ${name}`, {
    actionLabel: 'Undo',
    onAction: async () => {
      await api('/api/collection', {method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({set_num: setNum, quantity: quantity || 1})});
      loadCollection();
    },
  });
}

// ---------------- buildable ----------------
let buildOffset = 0;
const PAGE = 60;
let buildBusy = false;

for (const id of ['f-minparts', 'f-theme', 'f-sort', 'f-ignorecolor', 'f-owned'])
  $('#' + id).addEventListener('change', () => loadBuildable(true));
$('#f-coverage').addEventListener('input', () => $('#cov-label').textContent = $('#f-coverage').value + '%');
$('#f-coverage').addEventListener('change', () => loadBuildable(true));
$('#load-more').onclick = () => loadBuildable(false);
$('#f-reset').onclick = () => {
  $('#f-coverage').value = 100; $('#cov-label').textContent = '100%';
  $('#f-minparts').value = 20;
  $('#f-theme').value = '';
  $('#f-sort').value = 'coverage';
  $('#f-ignorecolor').checked = false;
  $('#f-owned').checked = false;
  loadBuildable(true);
};

async function loadBuildable(reset) {
  if (buildBusy) return;
  buildBusy = true;
  if (reset) { buildOffset = 0; $('#buildable-grid').innerHTML = ''; }
  $('#buildable-count').textContent = 'computing…';
  try {
    const minParts = Math.max(1, parseInt($('#f-minparts').value, 10) || 1);
    $('#f-minparts').value = minParts;
    const p = new URLSearchParams({
      min_coverage: (+$('#f-coverage').value / 100).toString(),
      min_parts: minParts,
      ignore_color: $('#f-ignorecolor').checked,
      include_owned: $('#f-owned').checked,
      sort: $('#f-sort').value,
      limit: PAGE, offset: buildOffset,
    });
    if ($('#f-theme').value) p.set('theme_id', $('#f-theme').value);
    const data = await api('/api/buildable?' + p);
    buildOffset += data.results.length;
    $('#buildable-count').textContent = num(data.total) + ' sets match';
    $('#load-more').classList.toggle('hidden', buildOffset >= data.total);
    const cov100 = +$('#f-coverage').value === 100;
    $('#buildable-empty').classList.toggle('hidden', data.total > 0);
    if (!data.total) $('#buildable-empty').innerHTML = cov100
      ? '<p class="headline">Nothing fully buildable yet.</p><p>Lower the coverage slider to see near-misses, or add more sets.</p>'
      : '<p class="headline">No matches.</p><p>Try loosening the filters.</p>';
    $('#buildable-grid').insertAdjacentHTML('beforeend', data.results.map(s => {
      const pct = Math.floor(s.coverage * 1000) / 10;
      const missing = s.total_parts - s.have_parts;
      const full = s.coverage >= 1;
      return `
      <div onclick="openMissing('${esc(s.set_num)}', '${esc(s.name).replace(/'/g, "\\'")}')"
           class="card buildable-card ${full ? 'is-complete' : ''}">
        <div class="buildable-thumb">
          <img src="${esc(s.img_url)}" loading="lazy" onerror="imgFallback(this)">
          <button aria-label="View ${esc(s.name)} in 3D" title="View in 3D"
            onclick="event.stopPropagation(); open3DModel('${esc(s.set_num)}', '${esc(s.name).replace(/'/g, "\\'")}')"
            class="thumb-badge-btn">3D</button>
        </div>
        <div class="buildable-body">
          <div class="text-sm font-medium truncate" title="${esc(s.name)}">${esc(s.name)}</div>
          <div class="text-xs text-muted" style="margin-top:.125rem;">${esc(s.set_num)} · ${s.year ?? '?'} · ${esc(s.theme ?? '')}</div>
          <div class="progress"><div class="progress-fill ${full ? 'is-complete' : ''}" style="width:${pct}%"></div></div>
          <div class="buildable-status">
            <span class="${full ? 'text-success font-semibold' : 'text-muted'}">${full ? '✓ Buildable' : pct + '%'}</span>
            <span class="text-muted">${full ? num(s.total_parts) + ' parts' : 'missing ' + num(missing) + ' of ' + num(s.total_parts)}</span>
          </div>
        </div>
      </div>`;
    }).join(''));
  } finally { buildBusy = false; }
}

// ---------------- shared modal dialog (focus trap, Escape, backdrop) ----------------
let openModalEl = null;
let modalTrigger = null;

function openModalDialog(modalEl) {
  modalTrigger = document.activeElement;
  openModalEl = modalEl;
  modalEl.classList.remove('hidden');
  document.addEventListener('keydown', modalKeydown);
}

function closeModalDialog() {
  if (!openModalEl) return;
  openModalEl.classList.add('hidden');
  openModalEl = null;
  document.removeEventListener('keydown', modalKeydown);
  if (modalTrigger) { modalTrigger.focus(); modalTrigger = null; }
  lego3dModule?.disposeViewer();
}

function modalKeydown(e) {
  if (!openModalEl) return;
  if (e.key === 'Escape') { closeModalDialog(); return; }
  if (e.key !== 'Tab') return;
  const focusables = Array.from(openModalEl.querySelectorAll('button, a[href], input, select, [tabindex]:not([tabindex="-1"])'))
    .filter(el => !el.disabled && el.offsetParent !== null);
  if (!focusables.length) return;
  const first = focusables[0], last = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
  else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
}

// ---------------- missing parts modal ----------------
async function openMissing(setNum, name) {
  openModalDialog($('#modal'));
  $('#modal-head').innerHTML = `<div id="modal-title-text" class="font-semibold">${esc(name)}</div>
    <div class="text-xs text-muted" style="margin-top:.125rem;">${esc(setNum)}</div>`;
  $('#modal-body').innerHTML = '<div class="text-sm text-muted">Loading…</div>';
  $('.modal-close', $('#modal')).focus();
  const ic = $('#f-ignorecolor').checked;
  const d = await api(`/api/sets/${encodeURIComponent(setNum)}/missing?ignore_color=${ic}`);
  if (!d.missing.length) {
    $('#modal-body').innerHTML = `<div class="text-success font-medium">✓ You have every part — ${d.total_lots} part lots covered.</div>`;
    return;
  }
  const shortTotal = d.missing.reduce((a, p) => a + (p.need - p.have), 0);
  $('#modal-body').innerHTML = `
    <div id="fill-options" style="margin-bottom:1.25rem;"><div class="text-sm text-muted">Finding sets that would fill the gap…</div></div>` + `
    <div class="text-sm" style="margin-bottom:.75rem;">${d.covered_lots} of ${d.total_lots} lots covered —
      <b class="text-primary">${num(shortTotal)} parts missing</b> across ${d.missing.length} lots:</div>
    <table class="data-table">
      <thead><tr>
        <th>Part</th><th>Color</th>
        <th class="text-right">Have</th><th class="text-right">Need</th>
        <th class="text-right text-danger">Short</th></tr></thead>
      <tbody>${d.missing.map(p => `
        <tr>
          <td><span class="text-muted">${esc(p.part_num)}</span> ${esc(p.part_name ?? '')}</td>
          <td style="white-space:nowrap;">${p.rgb ? `<span class="color-chip" style="background:#${esc(p.rgb)}"></span>` : ''}${esc(p.color ?? 'any')}</td>
          <td class="text-right num">${num(p.have)}</td>
          <td class="text-right num">${num(p.need)}</td>
          <td class="text-right text-danger font-medium num">${num(p.need - p.have)}</td>
        </tr>`).join('')}
      </tbody></table>`;
  loadFillOptions(setNum, ic);
}

function donorCard(s, note) {
  return `
    <a href="https://rebrickable.com/sets/${encodeURIComponent(s.set_num)}/" target="_blank" rel="noopener" class="donor-card">
      <img src="${esc(s.img_url)}" loading="lazy" onerror="imgFallback(this)"
           class="thumb" style="width:3rem;height:3rem;">
      <div class="min-w-0">
        <div class="text-sm font-medium truncate">${esc(s.name)}</div>
        <div class="text-xs text-muted">${esc(s.set_num)} · ${s.year ?? '?'} · ${num(s.num_parts)} parts${note ? ' · ' + note : ''}</div>
      </div>
    </a>`;
}

async function loadFillOptions(setNum, ic) {
  const d = await api(`/api/sets/${encodeURIComponent(setNum)}/fill?ignore_color=${ic}`);
  const box = $('#fill-options');
  if (!box) return;
  let html = '';
  if (d.singles.length) {
    html += `<div class="text-sm font-semibold text-primary" style="margin-bottom:.5rem;">💡 One set would cover everything missing:</div>
      <div class="grid gap-2">${d.singles.map(s => donorCard(s, 'covers all ' + num(d.gap_parts) + ' missing')).join('')}</div>`;
  }
  if (d.pairs.length) {
    html += `<div class="text-sm font-semibold text-primary" style="margin:.75rem 0 .5rem;">${d.singles.length ? 'Or pair up:' : '💡 These pairs together cover everything missing:'}</div>
      <div class="grid gap-2">${d.pairs.map(pr => `
        <div class="flex" style="align-items:stretch; gap:.5rem;">
          ${donorCard(pr[0], Math.round(pr[0].covers_pct * 100) + '% of gap')}
          <span style="align-self:center;" class="text-muted font-bold shrink-0">+</span>
          ${donorCard(pr[1], Math.round(pr[1].covers_pct * 100) + '% of gap')}
        </div>`).join('')}</div>`;
  }
  if (!d.singles.length && !d.pairs.length) {
    if (d.near_pairs?.length) {
      html += `<div class="text-sm font-semibold" style="margin-bottom:.5rem;">No combo covers 100% of the gap — closest pairings:</div>
        <div class="grid gap-2">${d.near_pairs.map(pr => `
          <div>
            <div class="flex" style="align-items:stretch; gap:.5rem;">
              ${donorCard(pr[0], Math.round(pr[0].covers_pct * 100) + '%')}
              <span style="align-self:center;" class="text-muted font-bold shrink-0">+</span>
              ${donorCard(pr[1], Math.round(pr[1].covers_pct * 100) + '%')}
            </div>
            <div class="text-xs text-muted" style="margin-top:.25rem; text-align:right;">together: ${Math.round(pr[2].combined_pct * 100)}% of the gap (${num(d.gap_parts - pr[2].combined)} parts still short)</div>
          </div>`).join('')}</div>`;
    } else if (d.partial.length) {
      html += `<div class="text-sm font-semibold" style="margin-bottom:.5rem;">No single set or pair covers the whole gap — closest contributors:</div>
        <div class="grid gap-2">${d.partial.map(s => donorCard(s, 'covers ' + Math.round(s.covers_pct * 100) + '% of gap')).join('')}</div>`;
    }
  }
  box.innerHTML = html;
}

// ---------------- 3D viewer modal ----------------
// LDraw model lookup/rendering (three.js + LDrawLoader) is loaded on demand,
// only once someone opens this modal — see public/lego3d.js and
// design/DESIGN_SYSTEM.md for what's verified vs. best-effort about it.
let lego3dModule = null;

async function open3DModel(setNum, name) {
  openModalDialog($('#modal-3d'));
  $('#modal-3d-head').innerHTML = `<div id="modal-3d-title" class="font-semibold">${esc(name)}</div>
    <div class="text-xs text-muted" style="margin-top:.125rem;">${esc(setNum)}</div>`;
  const container = $('#viewer-3d-container');
  container.innerHTML = '<div class="flex items-center justify-center text-sm text-muted" style="height:100%;">Looking up a 3D model…</div>';
  $('.modal-close', $('#modal-3d')).focus();

  try {
    const info = await api(`/api/sets/${encodeURIComponent(setNum)}/ldraw-model`);
    if (!openModalEl) return; // closed while the lookup was in flight
    if (!info.available) {
      container.innerHTML = `<div class="text-sm text-muted" style="padding:1.5rem;">
        No 3D model found for this set yet on
        <a href="https://library.ldraw.org/omr" target="_blank" rel="noopener" class="text-primary">LDraw.org's community model repository</a>.
      </div>`;
      return;
    }
    container.innerHTML = '<div class="flex items-center justify-center text-sm text-muted" style="height:100%;">Loading model…</div>';
    lego3dModule = lego3dModule || await import('./lego3d.js');
    if (!openModalEl) return;
    container.innerHTML = '';
    await lego3dModule.renderModel(container, `/api/sets/${encodeURIComponent(setNum)}/ldraw-model/file`);
  } catch (e) {
    if (openModalEl) container.innerHTML = '<div class="text-sm text-danger" style="padding:1.5rem;">Couldn\'t load the 3D model.</div>';
  }
}

// ---------------- 3D collection map ----------------
let lego3dMapModule = null;
let mapLoadToken = 0; // guards against a stale load finishing after the tab was switched away and back

async function loadMap() {
  const token = ++mapLoadToken;
  const data = await api('/api/collection');
  const sets = data.sets;
  $('#map-empty').classList.toggle('hidden', sets.length > 0);
  $('#map-wrap').classList.toggle('hidden', sets.length === 0);
  if (!sets.length) return;

  const cached = await api('/api/collection/ldraw-models').catch(() => ({}));
  if (token !== mapLoadToken) return;

  const items = sets.map(s => ({
    setNum: s.set_num, name: s.name, imgUrl: s.img_url,
    modelFileUrl: cached[s.set_num] ? `/api/sets/${encodeURIComponent(s.set_num)}/ldraw-model/file` : null,
  }));

  lego3dMapModule = lego3dMapModule || await import('./lego3dmap.js');
  if (token !== mapLoadToken) return;

  let upgraded = 0;
  $('#map-loading').textContent = `Placing ${items.length} sets…`;
  await lego3dMapModule.renderCollectionMap($('#map-container'), items, {
    onLockChange: locked => $('#map-hint').classList.toggle('is-hidden', locked),
    onSetSettled: (setNum, hasModel) => {
      if (token !== mapLoadToken) return;
      if (hasModel) upgraded++;
      $('#map-loading').textContent =
        `${upgraded} of ${items.length} sets rendered in 3D so far — the rest show as photo cards.`;
    },
  });

  // Sets not yet in the cache: check them in the background (a few at a
  // time) purely to warm the cache for next visit — not awaited, and never
  // shows an error toast, since this wasn't a user-initiated action.
  warmModelCache(sets.map(s => s.set_num).filter(n => !(n in cached)));
}

async function warmModelCache(setNums) {
  let cursor = 0;
  const worker = async () => {
    while (cursor < setNums.length) {
      const setNum = setNums[cursor++];
      try { await fetch(`/api/sets/${encodeURIComponent(setNum)}/ldraw-model`); } catch { /* best-effort */ }
    }
  };
  await Promise.all(Array.from({length: Math.min(3, setNums.length)}, worker));
}

// ---------------- init ----------------
(async function init() {
  showTab('collection');
  loadCollection();
  const themes = await api('/api/themes');
  $('#f-theme').insertAdjacentHTML('beforeend',
    themes.map(t => `<option value="${t.id}">${esc(t.name)} (${t.n})</option>`).join(''));
})();
</script>
